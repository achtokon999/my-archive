<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#2e7d32">
    <title>나만의 박물관</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>📸 나만의 박물관</h1>

    <div class="card">

        <label>사진</label>
        <input type="file" id="imageInput" accept="image/*">

        <img id="preview" class="preview" />

        <label>제목</label>
        <input type="text" id="titleInput" placeholder="제목 입력">

        <label>카테고리</label>

<select id="categoryInput">

    <option value="자연">🌿 자연</option>

    <option value="건축·유산">
        🏛️ 건축·유산
    </option>

    <option value="전시·예술">
        🎨 전시·예술
    </option>

    <option value="도시풍경">
        🏙️ 도시풍경
    </option>

    <option value="기타">
        📷 기타
    </option>

</select>

        <label>메모</label>
        <textarea id="memoInput" rows="4" placeholder="관찰 기록 입력"></textarea>

        <button id="saveBtn">저장</button>

    </div>

    <h2>기록 목록</h2>
<div class="filter-bar">

    <button onclick="filterRecords('전체')">
        전체
    </button>

    <button onclick="filterRecords('자연')">
        🌿 자연
    </button>

    <button onclick="filterRecords('건축·유산')">
        🏛️ 건축·유산
    </button>

    <button onclick="filterRecords('전시·예술')">
        🎨 전시·예술
    </button>

    <button onclick="filterRecords('도시풍경')">
        🏙️ 도시풍경
    </button>

    <button onclick="filterRecords('기타')">
        📷 기타
    </button>

</div>
    <div id="recordList"></div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="app.js"></script>

</body>
</html>
